<header id="header">
  <nav class="navbar navbar-inverse">
    <div class="container-fluid">
      <div class="navbar-header">
        <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#myNavbar">
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
        <a class="navbar-brand" routerLink="/">E-Commerce</a>
      </div>

      <div class="collapse navbar-collapse" id="myNavbar">
        <ul class="nav navbar-nav">
          <li routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <a routerLink="/"><span class="glyphicon glyphicon-home"></span> Home</a>
          </li>
          <li routerLinkActive="active">
            <a routerLink="/products"><span class="glyphicon glyphicon-shopping-cart"></span> Products</a>
          </li>
          <li routerLinkActive="active">
            <a routerLink="/orders"><span class="glyphicon glyphicon-list-alt"></span> Orders</a>
          </li>
        </ul>

        <ul class="nav navbar-nav navbar-right">
          @if (auth.isLoggedIn()) {
            <li class="dropdown">
              <a href="#" class="dropdown-toggle" data-toggle="dropdown">
                <span class="glyphicon glyphicon-user"></span> {{ auth.userEmail() }} <span class="caret"></span>
              </a>
              <ul class="dropdown-menu">
                <li><a routerLink="/profile"><span class="glyphicon glyphicon-user"></span> My Profile</a></li>
                <li class="divider"></li>
                <li><a routerLink="/profile/edit"><span class="glyphicon glyphicon-edit"></span> Edit Profile</a></li>
                <li class="divider"></li>
                <li><a routerLink="/profile/settings"><span class="glyphicon glyphicon-cog"></span> Settings</a></li>
                <li class="divider"></li>
                <li><a href="#" (click)="logout(); $event.preventDefault()"><span class="glyphicon glyphicon-log-out"></span> Logout</a></li>
              </ul>
            </li>
          } @else {
            <li routerLinkActive="active">
              <a routerLink="/login"><span class="glyphicon glyphicon-log-in"></span> Login</a>
            </li>
            <li routerLinkActive="active">
              <a routerLink="/register"><span class="glyphicon glyphicon-user"></span> Sign Up</a>
            </li>
          }
        </ul>
      </div>
    </div>
  </nav>
</header>
