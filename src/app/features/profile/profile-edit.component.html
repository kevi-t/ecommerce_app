<div class="auth-card">
  <h2 class="text-center">Edit Profile</h2>

  @if (loading) {
    <div class="text-center" style="padding:20px;"><span class="glyphicon glyphicon-refresh"></span> Loading...</div>
  } @else {
    @if (successMessage) {
      <div class="alert alert-success">{{ successMessage }}</div>
    }
    @if (errorMessage) {
      <div class="alert alert-danger">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSave()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" class="form-control" [(ngModel)]="name" name="name" required>
        @if (fieldErrors['name']) {
          <small class="text-danger">{{ fieldErrors['name'] }}</small>
        }
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" class="form-control" [(ngModel)]="phone_number" name="phone_number" placeholder="0722123456">
        @if (fieldErrors['phone_number']) {
          <small class="text-danger">{{ fieldErrors['phone_number'] }}</small>
        }
      </div>
      <button type="submit" class="btn btn-primary btn-block" [disabled]="saving">
        @if (saving) { <span class="glyphicon glyphicon-refresh"></span> }
        Save Changes
      </button>
      <a routerLink="/profile" class="btn btn-default btn-block" style="margin-top:8px;">Cancel</a>
    </form>
  }
</div>
